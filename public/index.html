<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>FHEM Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-extra.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand" title="FHEM">⌂</div>
    <nav id="tabs" class="tabs"></nav>
    <span id="status" class="status" title="Verbindung"></span>
    <button id="addBtn"  class="btn icon hidden" title="Kachel hinzufügen">＋</button>
    <button id="saveBtn" class="btn hidden">Speichern</button>
    <button id="settingsBtn" class="btn icon" title="Einstellungen">⚙</button>
    <button id="editBtn" class="btn btn-toggle icon" title="Bearbeiten">✎</button>
  </header>

  <main>
    <div class="grid-stack"></div>
  </main>

  <!-- Add/Edit tile dialog -->
  <dialog id="tileDialog">
    <form method="dialog" id="tileForm">
      <h3 id="dlgTitle">Kachel hinzufügen</h3>

      <label>Typ
        <select name="type" id="tType">
          <optgroup label="FHEM-Gerät">
            <option value="value">Wert / Sensor</option>
            <option value="switch">Schalter (on/off)</option>
            <option value="light">Licht (an/aus + RGB + CT)</option>
            <option value="readingsgroup">readingsGroup</option>
            <option value="button">Button(s) / Set-Befehle</option>
          </optgroup>
          <optgroup label="Ohne FHEM">
            <option value="group">Gruppe / Raum-Box</option>
            <option value="clock">Uhrzeit / Datum</option>
            <option value="note">Notiz</option>
            <option value="label">Beschriftung / Text</option>
          </optgroup>
        </select>
      </label>

      <label id="rowDevice">Gerät
        <input name="device" id="tDevice" placeholder="Gerät suchen…" autocomplete="off">
      </label>

      <label class="row-extra" id="rowReading">Reading
        <input name="reading" id="tReading" placeholder="z.B. state, temperature" autocomplete="off">
      </label>

      <label>Beschriftung
        <span class="label-row">
          <input name="label" id="tLabel" placeholder="Anzeigename">
          <button type="button" id="tLabelReset" class="lbl-reset" title="Auf Geräte-Alias zurücksetzen">↺</button>
        </span>
      </label>

      <div class="row-extra" id="rowIcon">
        <label>Icon</label>
        <button type="button" id="tIconField" class="icon-pick-btn" data-icon="">Standard</button>
      </div>

      <label class="row-extra" id="rowUnit">Einheit
        <input name="unit" id="tUnit" placeholder="°C, %, …">
      </label>

      <label class="row-extra" id="rowNote">Notiz
        <textarea name="noteText" id="tNote" rows="4" placeholder="Freier Text…"></textarea>
      </label>

      <div class="row-extra" id="rowCmds">
        <label>Anzeige
          <select id="btnDisplay">
            <option value="text">Text</option>
            <option value="icons">Icons</option>
            <option value="toggle">1 Icon wechselnd</option>
          </select>
        </label>
        <label>Buttons – Befehl + Text/Icon</label>
        <div id="cmdRows"></div>
        <datalist id="cmdSetList"></datalist>
        <button type="button" id="cmdAdd" class="btn">+ Befehl</button>
      </div>

      <div class="row-extra" id="rowLight">
        <label class="lopt"><input type="checkbox" id="lOptRgb"> RGB-Farbe</label>
        <label class="lsub">Farb-Befehl
          <select id="lRgbCmd"><option value="rgb">rgb</option><option value="hsv">hsv</option><option value="color">color</option></select>
        </label>
        <label class="lopt"><input type="checkbox" id="lOptCt"> Weiß (CT)</label>
        <div class="lsub lct-cfg">
          <label>Befehl <input id="lCtCmd" value="ct"></label>
          <label>von K <input id="lCtMin" type="number" value="2000"></label>
          <label>bis K <input id="lCtMax" type="number" value="6500"></label>
        </div>
        <label class="lopt"><input type="checkbox" id="lOptDim"> Helligkeit (Dimmen)</label>
      </div>

      <label class="lopt" id="rowHeader"><input type="checkbox" id="tHeader" checked> Titel anzeigen</label>

      <menu>
        <button value="cancel" class="btn">Abbrechen</button>
        <button value="ok" id="tOk" class="btn btn-primary">Übernehmen</button>
      </menu>
    </form>
  </dialog>

  <!-- Dedicated note editor (opens on tapping a note in normal mode) -->
  <dialog id="noteDialog">
    <form method="dialog">
      <h3>Notiz bearbeiten</h3>
      <label class="lopt"><input type="checkbox" id="nHeader" checked> Titel anzeigen</label>
      <label>Titel
        <span class="label-row">
          <input id="nTitle" placeholder="Titel">
          <button type="button" id="nIcon" class="icon-pick-btn" data-ph="Icon"></button>
        </span>
      </label>
      <label>Modus
        <select id="nMode">
          <option value="text">Text</option>
          <option value="check">Checkliste</option>
        </select>
      </label>
      <label id="nTextRow">Text
        <textarea id="nText" rows="6" placeholder="Freier Text…"></textarea>
      </label>
      <label id="nItemsRow">Punkte – eine Zeile pro Punkt
        <textarea id="nItems" rows="6" placeholder="Milch&#10;Eier&#10;Brot"></textarea>
      </label>
      <menu>
        <button value="cancel" class="btn">Abbrechen</button>
        <button value="ok" class="btn btn-primary">Übernehmen</button>
      </menu>
    </form>
  </dialog>

  <!-- Settings dialog -->
  <dialog id="settingsDialog">
    <form method="dialog" id="settingsForm">
      <h3>Einstellungen</h3>
      <label>Design
        <select id="sTheme">
          <option value="aurora">Dunkel</option>
          <option value="clean">Hell</option>
        </select>
      </label>
      <label>FHEM-Adresse (IP oder URL)
        <input name="fhemUrl" id="sFhemUrl" placeholder="z.B. 192.168.10.2:8083 oder http://host:8083/fhem">
      </label>
      <p class="hint" id="sHint">Beispiel: <code>192.168.10.2:8083</code> – <code>/fhem</code> wird ergänzt.</p>

      <label>Layout (alle Dashboards)</label>
      <div class="row-actions">
        <button type="button" id="btnExport" class="btn">⬇ Exportieren</button>
        <button type="button" id="btnImport" class="btn">⬆ Importieren</button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>

      <menu>
        <button value="cancel" class="btn">Schließen</button>
        <button value="test" id="sTest" class="btn">Testen</button>
        <button value="ok" id="sOk" class="btn btn-primary">Speichern</button>
      </menu>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
  <script src="js/api.js"></script>
  <script src="js/tiles.js"></script>
  <script src="js/live.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
