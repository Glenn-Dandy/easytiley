server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.html;

    # no-cache = store, but revalidate every load (cheap 304s in the LAN).
    # Browsers otherwise cache js/css heuristically -> stale UI after updates
    # until a hard reload. This makes normal reloads always pick up new code.
    add_header Cache-Control "no-cache";

    # Bundled libs + app icons never change in place (rename the path when
    # upgrading, e.g. vendor/gridstack-11/) -> cache hard, no revalidation.
    location ~* ^/(vendor|icons|sounds)/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + SSE -> php-fpm (same container, on 127.0.0.1:9000).
    # Buffering off so Server-Sent-Events stream live.
    location /api/ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_buffering off;
        fastcgi_read_timeout 3600s;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/api.php;
        fastcgi_param PATH_INFO $uri;
    }
}
