server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.html;

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + SSE -> single PHP front controller.
    # Buffering off so Server-Sent-Events stream live.
    location /api/ {
        fastcgi_pass php:9000;
        fastcgi_buffering off;
        fastcgi_read_timeout 3600s;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/api.php;
        fastcgi_param PATH_INFO $uri;
    }
}
