services:
  app:
    build: .
    image: easytiley:latest
    ports:
      - "${HTTP_PORT:-8080}:80"
    environment:
      - FHEM_URL=${FHEM_URL:-http://192.168.10.2:8083/fhem}
      - DB_PATH=/var/www/data/fhem.db
    volumes:
      - ./data:/var/www/data           # sqlite DB (dashboards) persists on the host
      # Dev only: live-edit code without rebuild (comment out for deploy)
      # - ./public:/var/www/public
      # - ./src:/var/www/src
    restart: unless-stopped
